services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./output:/usr/share/nginx/html
    depends_on:
      - disk

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: secret

  disk:
    build: .
    environment:
      THRESHOLD: 80
    volumes:
      - ./output:/output
    command: sh -c "/disk_check > /output/index.html && tail -f /dev/null"
